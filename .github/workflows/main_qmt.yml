name: Build and deploy Node.js app to Azure Web App - QMT

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Validate package.json (fail fast)
        shell: bash
        run: |
          jq -e . package.json || { echo "package.json is not valid JSON"; exit 1; }

      - name: Install dependencies and build
        env:
          NODE_ENV: development
        shell: bash
        run: |
          # Clean build artifacts and regenerate lockfile to match package.json
          rm -rf dist
          rm -f package-lock.json
          npm install

          echo "Building server..."
          npm run build

          # Try client build if present; continue if it doesn't exist or fails
          echo "Building client (optional)..."
          npm run build:client || echo "ℹ️ No client build or build:client failed — continuing"

      - name: Verify build outputs
        shell: bash
        run: |
          test -f dist/server/index.js || { echo "❌ dist/server/index.js not found"; exit 1; }
          test -f index.html || { echo "❌ index.html not found in repo root"; exit 1; }
          echo "✅ Build artifacts verified"

      - name: Show tree (top 2 levels)
        shell: bash
        run: |
          echo "Workspace tree:"
          find . -maxdepth 2 -type f | sed 's/^/  /'

      - name: Upload build artifacts (lightweight)
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            index.html
            dist/
            package.json
            package-lock.json
            src/
            public/
            assets/
          if-no-files-found: ignore
          # Intentionally exclude node_modules; App Service Oryx will run `npm install --production` at deploy time.

  deploy:
    runs-on: ubuntu-latest
    needs: build

    # OIDC token permission required for azure/login@v2
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Verify Azure context
        shell: bash
        run: az account show

      - name: Deploy to Azure Web App (Linux)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'QMT'
          package: '.'
          startup-command: 'npm start'

      - name: Post-deploy health check (/api/health)
        shell: bash
        run: |
          echo "Waiting for app to become healthy..."
          for i in {1..12}; do
            RESP=$(curl -sS --max-time 5 https://qmt.azurewebsites.net/api/health || true)
            STATUS=$(echo "$RESP" | jq -r '.status' 2>/dev/null || echo "unknown")
            DB=$(echo "$RESP" | jq -r '.database' 2>/dev/null || echo "unknown")

            if [ "$STATUS" = "ok" ] && [ "$DB" = "connected" ]; then
              echo "✅ Health check passed: $RESP"
              exit 0
            fi

            echo "Attempt $i/12: STATUS=$STATUS, DB=$DB"
            sleep 10
          done

          echo "❌ Health check failed. Last response:"
          echo "$RESP"
          exit 1
