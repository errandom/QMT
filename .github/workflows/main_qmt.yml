name: Build and deploy Node.js app to Azure Web App - QMT

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Validate package.json
        shell: bash
        run: jq -e . package.json || { echo "Invalid package.json"; exit 1; }

      # Try npm ci; if it fails due to lock mismatch, fall back to npm install
      - name: Install dependencies (ci with fallback)
        shell: bash
        run: |
          # Avoid engine-strict failures (we only want a warning for EBADENGINE)
          npm config set engine-strict false

          echo "Attempting npm ci..."
          if npm ci --prefer-offline --no-audit; then
            echo "✅ npm ci succeeded"
          else
            echo "⚠️ npm ci failed; falling back to npm install"
            rm -rf node_modules
            npm install --prefer-offline --no-audit
            echo "✅ npm install succeeded"
          fi

      - name: Build backend
        shell: bash
        run: |
          npm run build:server || { echo "❌ Missing or failing build:server script"; exit 1; }

      - name: Build frontend
        shell: bash
        run: |
          npm run build:client || { echo "❌ Missing or failing build:client script"; exit 1; }

      - name: Verify build outputs
        shell: bash
        run: |
          test -f dist/server/index.js || { echo "❌ Missing dist/server/index.js"; exit 1; }
          test -f dist/client/index.html || { echo "❌ Missing dist/client/index.html"; exit 1; }
          echo "✅ Build verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            dist/
            package.json
            package-lock.json
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'QMT'
          package: '.'
          startup-command: 'NODE_ENV=production node --trace-uncaught dist/server/index.js'

      # Short warm-up (ignore curl errors, retry up to ~50s)
      - name: Warm up homepage
        shell: bash
        run: |
          BASE="https://qmt.azurewebsites.net"
          echo "Warming up $BASE ..."
          for i in {1..5}; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 "$BASE/" || echo "000")
            echo "Warm-up attempt $i: http=$CODE"
            if [ "$CODE" = "200" ]; then
              echo "✅ Homepage responded with 200"
              break
            fi
            sleep 10
          done

      # Fail-fast health check (5 attempts, ~50s total)
      - name: Health check
        shell: bash
        run: |
          BASE="https://qmt.azurewebsites.net/api/health"
          echo "Checking health endpoint..."
          LAST=""
          for i in {1..5}; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 "$BASE" || echo "000")
            RESP=$(curl -sS --connect-timeout 10 --max-time 15 -H "Accept: application/json" "$BASE" || true)
            STATUS=$(echo "$RESP" | jq -r '.status // empty' 2>/dev/null || echo "")
            DB=$(echo "$RESP" | jq -r '.database // empty' 2>/dev/null || echo "")
            echo "Attempt $i: http=$CODE status=${STATUS:-unknown} db=${DB:-unknown}"

            if [ "$CODE" = "200" ] && [ "$STATUS" = "ok" ]; then
              echo "✅ Health check passed: $RESP"
              exit 0
            fi

            LAST="$RESP"
            sleep 10
          done

          echo "❌ Health check failed. Last
