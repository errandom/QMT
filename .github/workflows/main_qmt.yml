name: Build and deploy Node.js app to Azure Web App - QMT

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Validate package.json (fail fast)
        shell: bash
        run: |
          jq -e . package.json || { echo "package.json is not valid JSON"; exit 1; }

      - name: Install dependencies and build
        env:
          NODE_ENV: development
        shell: bash
        run: |
          rm -rf dist
          rm -f package-lock.json
          npm install

          echo "Building server..."
          npm run build

          echo "Building client (optional)..."
          npm run build:client || echo "ℹ️ No client build or build:client failed — continuing"

      - name: Verify build outputs
        shell: bash
        run: |
          test -f dist/server/index.js || { echo "❌ dist/server/index.js not found"; exit 1; }
          test -f index.html || { echo "❌ index.html not found in repo root"; exit 1; }
          echo "✅ Build artifacts verified"

      - name: Show tree (top 2 levels)
        shell: bash
        run: |
          echo "Workspace tree:"
          find . -maxdepth 2 -type f | sed 's/^/  /'

      - name: Upload build artifacts (lightweight)
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            index.html
            dist/
            package.json
            package-lock.json
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Verify Azure context
        shell: bash
        run: az account show

      - name: Deploy to Azure Web App (Linux)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'QMT'
          package: '.'
          startup-command: 'npm start'

      # ---- Warm-up step (ignore curl errors) ----
      - name: Warm up application (homepage probe)
        shell: bash
        run: |
          BASE="https://qmt.azurewebsites.net"
          echo "Warming up $BASE ..."
          for i in {1..20}; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 "$BASE/" || echo "000")
            echo "Warm-up attempt $i: http=$CODE"
            if [ "$CODE" = "200" ]; then
              echo "✅ Warm-up complete (homepage 200)"
              break
            fi
            sleep 10
          done

      # ---- Health check with retries ----
      - name: Post-deploy health check (/api/health)
        shell: bash
        run: |
          BASE="https://qmt.azurewebsites.net"
          echo "Waiting for app to become healthy (up to ~5 minutes)..."
          LAST=""
          for i in {1..24}; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 "$BASE/api/health" || echo "000")
            RESP=$(curl -sS --connect-timeout 10 --max-time 15 -H "Accept: application/json" "$BASE/api/health" || true)
            STATUS=$(echo "$RESP" | jq -r '.status // empty' 2>/dev/null || echo "")
            DB=$(echo "$RESP" | jq -r '.database // empty' 2>/dev/null || echo "")

            echo "Attempt $i: http=$CODE status=${STATUS:-unknown} db=${DB:-unknown}"

            if [ "$CODE" = "200" ] && [ "$STATUS" = "ok" ] && [ "$DB" = "connected" ]; then
              echo "✅ Health check passed: $RESP"
              exit 0
            fi

            LAST="$RESP"
            sleep 10
          done

          echo "❌ Health check failed. Last response:"
          echo "$LAST"
