name: Build and deploy Node.js app to Azure Web App - QMT

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies and build
        shell: bash
        env:
          NODE_ENV: development
        run: |
          rm -rf dist
          # Regenerate lock file to resolve npm ci mismatch errors
          rm -f package-lock.json
          npm install
          echo "Starting full build..."
          if npm run build; then
            echo "Full build completed"
          else
            echo "Full build failed, building server only"
            npm install --save-dev @types/node @types/express @types/jsonwebtoken @types/bcryptjs
            npm run build:server
          fi

      - name: Show compiled server entry (first 30 lines)
        shell: bash
        run: sed -n '1,30p' dist/server/index.js || echo "No server build found"

      - name: Verify client build exists
        shell: bash
        run: |
          if [ -f dist/index.html ]; then
            echo "dist/index.html present"
          else
            echo "dist/index.html missing; did copy-client run?"
            exit 1
          fi

      - name: Upload build artifacts (lightweight)
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            dist/
            package.json
            package-lock.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App (Linux)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'QMT'
          package: '.'
