name: Build and deploy Node.js app to Azure Web App - QMT

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Validate package.json (fail fast)
        shell: bash
        run: |
          jq -e . package.json || { echo "package.json is not valid JSON"; exit 1; }

      - name: Install dependencies and build server
        env:
          NODE_ENV: development
        shell: bash
        run: |
          rm -rf dist
          npm ci --include=dev
          echo "Building server..."
          npm run build

      - name: Verify outputs (server and index.html in root)
        shell: bash
        run: |
          test -f dist/server/index.js || { echo "❌ dist/server/index.js not found"; exit 1; }
          test -f index.html || { echo "❌ index.html not found in repo root"; exit 1; }
          echo "✅ Build artifacts verified"

      - name: Upload build artifacts (lightweight)
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            index.html
            dist/
            package.json
            package-lock.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App (Linux)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'QMT'
          package: '.'
