deploy:
  runs-on: ubuntu-latest
  needs: build
  permissions:
    id-token: write
    contents: read

  steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: node-app
        path: .

    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EBE2B72D41B641BCA78293AE35E90D0D }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_71BA4A2F74C2486EBBC8133A1E163C61 }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_31F8C530965645BBA41ABCD6D3E3CF99 }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'QMT'
        slot-name: 'Production'
