name: Build and deploy Node.js app to Azure Web App - QMT

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show original package.json (visible control chars)
        shell: bash
        run: |
          echo "--- package.json as read by runner ---"
          sed -n '1,200p' package.json | sed -e 's/\t/<TAB>/g'
          echo "-------------------------------------"

      - name: Sanitize + validate package.json (with canonical fallback)
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs');
          function sanitize(s) {
            // strip BOM
            s = s.replace(/^\uFEFF/, '');
            // replace common HTML entities
            s = s.replace(/&gt;/g, '>')
                 .replace(/&lt;/g, '<')
                 .replace(/&amp;/g, '&');
            // normalize smart quotes to ASCII
            s = s.replace(/[\u201C\u201D]/g, '"')
                 .replace(/[\u2018\u2019]/g, "'");
            // remove accidental extra quotes/spaces before keys:  "  "engines":
            s = s.replace(/"\s+"([A-Za-z0-9_.-]+)"\s*:/g, '"$1":');
            return s;
          }

          let txt = fs.readFileSync('package.json', 'utf8');
          let sanitized = sanitize(txt);
          try {
            JSON.parse(sanitized);
            fs.writeFileSync('package.json', sanitized, 'utf8');
            console.log('✅ package.json sanitized and valid');
          } catch (e) {
            console.error('❌ package.json invalid even after sanitize. Applying canonical fallback.');
            const canonical = `{
  "name": "spark-template",
  "version": "0.0.0",
  "type": "module",
  "main": "dist/server/index.js",
  "scripts": {
    "start": "node dist/server/index.js",
    "build": "npm run build:client && npm run build:server && npm run copy-client",
    "build:client": "vite build",
    "build:server": "tsc -p tsconfig.server.json",
    "copy-client": "cp -r client/dist/* dist/",
    "verify": "node -e \\"JSON.parse(require('fs').readFileSync('package.json','utf8'))\\" && echo \\"package.json OK\\""
  },
  "dependencies": {
    "express": "^4.18.2",
    "cors": "^2.8.5",
    "dotenv": "^16.3.1",
    "mssql": "^9.1.1",
    "jsonwebtoken": "^9.0.2",
    "bcryptjs": "^2.4.3"
  },
  "devDependencies": {
    "typescript": "^5.3.3",
    "@types/node": "^20.10.5",
    "@types/express": "^4.17.21",
    "@types/jsonwebtoken": "^9.0.2",
    "@types/bcryptjs": "^2.4.2",
    "vite": "^5.0.0"
  },
  "engines": {
    "node": ">=20 <21"
  }
}`;
            fs.writeFileSync('package.json', canonical, 'utf8');
            // validate canonical
            JSON.parse(fs.readFileSync('package.json','utf8'));
            console.log('✅ canonical package.json written and valid');
          }
          EOF

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies and clean build
        env:
          NODE_ENV: development
        shell: bash
        run: |
          rm -rf dist
          npm ci --include=dev
          echo "Starting full build..."
          if npm run build; then
            echo "✅ Full build completed"
          else
            echo "⚠️ Full build failed, running fallback (server only)"
            npm install --save-dev @types/node @types/express @types/jsonwebtoken @types/bcryptjs
            npm run build:server
          fi

      - name: Show compiled server entry (first 30 lines)
        run: sed -n '1,30p' dist/server/index.js || echo "⚠️ No server build found"

      - name: Verify compiled code (wildcard route guard)
        shell: bash
        run: |
          if [ -f dist/server/index.js ]; then
            if grep -E "app\\.get\\(\\/.\\*/" dist/server/index.js; then
              echo "✅ Regex wildcard route present"
            elif grep "app.get('/*'" dist/server/index.js; then
              echo "❌ Old string wildcard route found in compiled code"
              exit 1
            else
              echo "ℹ️ No wildcard route found; ensure SPA fallback is configured"
            fi
          else
            echo "⚠️ No server build found, skipping verification"
          fi

      - name: Prepare artifact (dist + runtime manifest)
        shell: bash
        run: |
          test -f dist/index.html || (echo "❌ dist/index.html missing; did copy-client run?" && exit 1)
          echo "Final dist tree (depth 2):"
          find dist -maxdepth 2 -type f | sed 's/^/  /'

      - name: Upload build artifacts (lightweight)
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            dist/
            package.json
            package-lock.json
          # Lighter artifacts: exclude node_modules. Oryx will install production deps on App Service.

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .  # flatten so package '.' is correct

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App (Linux)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'QMT'
          package: '.'
