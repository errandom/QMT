name: Build and deploy Node.js app to Azure Web App - QMT

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate or repair package.json
        shell: bash
        run: |
          if jq -e . package.json; then
            echo "package.json OK"
          else
            echo "package.json invalid. Writing canonical package.json."
            printf '%s\n' \
'{' \
'  "name": "spark-template",' \
'  "version": "0.0.0",' \
'  "type": "module",' \
'  "main": "dist/server/index.js",' \
'  "scripts": {' \
'    "start": "node dist/server/index.js",' \
'    "build": "npm run build:server",' \
'    "build:server": "tsc -p tsconfig.server.json"' \
'  },' \
'  "dependencies": {' \
'    "express": "^4.18.2",' \
'    "cors": "^2.8.5",' \
'    "dotenv": "^16.3.1",' \
'    "mssql": "^9.1.1",' \
'    "jsonwebtoken": "^9.0.2",' \
'    "bcryptjs": "^2.4.3"' \
'  },' \
'  "devDependencies": {' \
'    "typescript": "^5.3.3",' \
'    "@types/node": "^20.10.5",' \
'    "@types/express": "^4.17.21",' \
'    "@types/jsonwebtoken": "^9.0.2",' \
'    "@types/bcryptjs": "^2.4.2",' \
'    "@types/cors": "^2.8.17"' \
'  }' \
'}' | tee package.json
            jq -e . package.json || { echo "Canonical package.json still invalid"; exit 1; }
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies and build
        env:
          NODE_ENV: development
        shell: bash
        run: |
          rm -rf dist
          npm ci --include=dev
          echo "Building server..."
          npm run build

      - name: Prepare artifact (root index.html + dist)
        shell: bash
        run: |
          if [ -f index.html ]; then
            echo "index.html found in root"
          else
            echo "index.html missing in root"
            exit 1
          fi
          echo "Final tree (max depth 2):"
          find . -maxdepth 2 -type f | sed 's/^/  /'

      - name: Upload build artifacts (lightweight)
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            index.html
            dist/
            package.json
            package-lock.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App (Linux)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'QMT'
          package: '.'
