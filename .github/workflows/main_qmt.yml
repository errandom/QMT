name: Build and deploy Node.js app to Azure Web App - QMT

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Validate package.json
        run: jq -e . package.json || { echo "Invalid package.json"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build:server || echo "ℹ️ No backend build script found"

      - name: Build frontend
        run: npm run build:client || echo "ℹ️ No client build script found"

      - name: Verify build outputs
        run: |
          test -f dist/server/index.js || { echo "❌ Missing dist/server/index.js"; exit 1; }
          test -f dist/client/index.html || { echo "❌ Missing dist/client/index.html"; exit 1; }
          echo "✅ Build verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            dist/
            package.json
            package-lock.json
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'QMT'
          package: '.'
          startup-command: 'node dist/server/index.js'

      - name: Warm up homepage
        run: |
          BASE="https://qmt.azurewebsites.net"
          echo "Warming up $BASE ..."
          for i in {1..5}; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" "$BASE/" || echo "000")
            echo "Warm-up attempt $i: http=$CODE"
            if [ "$CODE" = "200" ]; then
              echo "✅ Homepage responded with 200"
              break
            fi
            sleep 10
          done

      - name: Health check
        run: |
          BASE="https://qmt.azurewebsites.net/api/health"
          echo "Checking health endpoint..."
          LAST=""
          for i in {1..5}; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" "$BASE" || echo "000")
            RESP=$(curl -sS -H "Accept: application/json" "$BASE" || true)
            STATUS=$(echo "$RESP" | jq -r '.status // empty' 2>/dev/null || echo "")
            DB=$(echo "$RESP" | jq -r '.database // empty' 2>/dev/null || echo "")
            echo "Attempt $i: http=$CODE status=${STATUS:-unknown} db=${DB:-unknown}"

            if [ "$CODE" = "200" ] && [ "$STATUS" = "ok" ]; then
              echo "✅ Health check passed: $RESP"
              exit 0
            fi

            LAST="$RESP"
            sleep 10
          done
