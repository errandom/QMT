
name: Build and deploy Node.js app to Azure Web App - QMT

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # ✅ Install dependencies and clean build
      - name: Install dependencies and build
        run: |
          rm -rf dist
          npm install
          # Build client (React/Vue/Angular) and server
          npm run build:client
          npm run build:server
          # ✅ Copy client build output into dist for Azure deployment
          cp -r client/dist/* dist/

      # ✅ Debug compiled server entry point
      - name: Debug compiled route
        run: head -n 20 dist/server/index.js

      # ✅ Remove old wildcard verification (no longer needed)
      # (Optional: Keep if you want to enforce regex route check)
      # - name: Verify compiled code
      #   run: |
      #     if grep "app.get('/*'" dist/server/index.js; then
      #       echo "❌ Old wildcard route found in compiled code"
      #       exit 1
      #     else
      #       echo "✅ Route verified"
      #     fi

      # ✅ Upload build artifacts for deployment
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            dist/
            package.json
            package-lock.json
            node_modules/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      # Download build artifacts
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with        with:
          name: node-app

      # Login to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_14FCFD877DFD43E98F3625F910DCD3EA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5BC7800D449E4D1387345A55C90C5D2D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_641C0CE361064A4E87E90FD3E890DF19 }}

      # Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'QMT'
          slot-name: 'Production'
