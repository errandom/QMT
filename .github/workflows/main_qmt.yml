name: Build and deploy Node.js app to Azure Web App - QMT

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies and clean build
        env:
          NODE_ENV: development
        run: |
          rm -rf dist
          npm install --include=dev
          echo "Starting full build..."
          if npm run build; then
            echo "✅ Full build completed"
          else
            echo "⚠️ Full build failed, running fallback (server only)"
            npm install --save-dev @types/node @types/express @types/jsonwebtoken @types/bcryptjs
            npm run build:server
          fi

      - name: Debug compiled route
        run: head -n 20 dist/server/index.js || echo "⚠️ No server build found"

      - name: Verify compiled code
        run: |
          if [ -f dist/server/index.js ]; then
            if grep "app.get('/*'" dist/server/index.js; then
              echo "❌ Old wildcard route found in compiled code"
              exit 1
            else
              echo "✅ Route verified"
            fi
          else
            echo "⚠️ No server build found, skipping verification"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            dist/
            package.json
            package-lock.json
            node_modules/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'QMT'
          slot-name: 'Production'
          package: '.'
